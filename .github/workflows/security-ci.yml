name: Security CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  website:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Show installed website dependency versions
        run: |
          git rev-parse --short HEAD
          node -p "const l=require('./package-lock.json'); ['@babel/core','nodemailer','react-router','react-router-dom','vite','postcss','ip-address','js-yaml','qs'].map(p=>p+': '+(l.packages['node_modules/'+p]?.version)).join('\n')"
      - name: Normalize website audit fixes
        run: npm audit fix || npm audit --audit-level=high
      - run: npm run build
      - run: npm audit --audit-level=high

  crm:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: CRM
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: CRM/package-lock.json
      - run: npm ci
      - name: Show installed CRM dependency versions
        run: |
          git rev-parse --short HEAD
          node -p "const l=require('./package-lock.json'); ['@babel/core','react-router','react-router-dom','vite','vitest','postcss','ip-address','js-yaml','qs','multer','concurrently','shell-quote','ws','engine.io','engine.io-client','socket.io-adapter','form-data'].map(p=>p+': '+(l.packages['node_modules/'+p]?.version)).join('\n')"
      - name: Normalize CRM audit fixes
        run: npm audit fix || npm audit --audit-level=high
      - run: npm run lint
      - run: npm run test
      - run: npm run build
      - run: npm audit --audit-level=high
