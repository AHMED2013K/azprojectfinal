version: "3.9"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  app:
    build: .
    depends_on:
      - mongo
    ports:
      - "4000:4000"
      - "5173:5173"
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongo:27017/edugrowth_crm

volumes:
  mongo_data:
