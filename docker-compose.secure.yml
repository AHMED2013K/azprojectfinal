services:
  website:
    build:
      context: .
      dockerfile: Dockerfile.website
    restart: unless-stopped
    ports:
      - "8080:80"

  crm-frontend:
    build:
      context: ./CRM
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - crm-api

  crm-api:
    build:
      context: ./CRM
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file:
      - ./CRM/.env
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/edugrowth_crm
    ports:
      - "4000:4000"
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    restart: unless-stopped
    command: ["--bind_ip_all"]
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
