server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # These historical application routes are duplicate entry points. Keep their
  # accumulated links, but consolidate their indexing signals on one URL.
  location = /home { return 301 https://edugrowth.tn/; }
  location = /home/ { return 301 https://edugrowth.tn/; }
  location = /ousourcing { return 301 https://edugrowth.tn/outsourcing/; }
  location = /ousourcing/ { return 301 https://edugrowth.tn/outsourcing/; }
  location = /outourcing { return 301 https://edugrowth.tn/outsourcing/; }
  location = /outourcing/ { return 301 https://edugrowth.tn/outsourcing/; }

  # Vite fingerprints JavaScript and CSS files. Long-lived immutable caching
  # removes repeat-visit transfer cost without making deployments stale.
  location ~* \.(?:js|css|woff2?|webp|png|jpe?g|svg|ico)$ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  add_header X-Frame-Options DENY always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy no-referrer always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  location / {
    try_files $uri $uri/ /index.html;
  }
}
