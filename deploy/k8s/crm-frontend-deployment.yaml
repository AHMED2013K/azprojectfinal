apiVersion: apps/v1
kind: Deployment
metadata:
  name: crm-frontend
  namespace: edugrowth
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crm-frontend
  template:
    metadata:
      labels:
        app: crm-frontend
    spec:
      containers:
        - name: crm-frontend
          image: ghcr.io/your-org/edugrowth-crm-frontend:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: crm-frontend
  namespace: edugrowth
spec:
  selector:
    app: crm-frontend
  ports:
    - port: 80
      targetPort: 80
