apiVersion: apps/v1
kind: Deployment
metadata:
  name: website
  namespace: edugrowth
spec:
  replicas: 2
  selector:
    matchLabels:
      app: website
  template:
    metadata:
      labels:
        app: website
    spec:
      containers:
        - name: website
          image: ghcr.io/your-org/edugrowth-website:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: website
  namespace: edugrowth
spec:
  selector:
    app: website
  ports:
    - port: 80
      targetPort: 80
